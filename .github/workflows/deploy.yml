name: Deploy web tool

# Builds the browser font generator (web/) and deploys it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # web/ links the parent font-tools via file:.. — install the root deps too so that
      # font-tools' own source (e.g. glyph-source-msdfgen.js) resolves its bare imports.
      - name: Install font-tools (root) deps
        run: npm install
      - name: Build web tool
        working-directory: web
        run: |
          npm install
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
