<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayCanvas MSDF Font Generator</title>
    <style>
        :root { color-scheme: dark; }
        body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: #1e1e1e; color: #e0e0e0; }
        header { padding: 14px 24px; border-bottom: 1px solid #333; }
        header h1 { margin: 0; font-size: 18px; font-weight: 600; }
        header p { margin: 4px 0 0; color: #999; font-size: 13px; }
        main { display: grid; grid-template-columns: 290px 1fr; height: calc(100vh - 64px); }
        .panel { padding: 18px 22px; border-right: 1px solid #333; overflow: auto; }
        label { display: block; margin: 12px 0 4px; color: #bbb; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
        input, select { box-sizing: border-box; padding: 7px 9px; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 5px; }
        .panel input, .panel select { width: 100%; }
        button { margin-top: 18px; width: 100%; padding: 10px; background: #ff6600; color: #fff; border: 0; border-radius: 5px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: .5; cursor: default; }
        #status { margin-top: 12px; color: #999; font-size: 13px; min-height: 18px; }
        .downloads a { display: none; margin-top: 8px; color: #ff8c42; text-decoration: none; }
        .view { padding: 20px 24px; overflow: auto; }
        .view h2 { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: .04em; margin: 0 0 10px; }
        .pctl { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .pctl #ptext { flex: 1 1 320px; }
        .pctl input[type=number] { width: 76px; }
        #preview { width: 100%; height: 360px; display: block; background: #141414; border: 1px solid #333; border-radius: 6px; }
        details { margin-top: 18px; }
        summary { cursor: pointer; color: #999; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
        #atlas { margin-top: 10px; max-width: 100%; background: #000; border: 1px solid #333; image-rendering: pixelated; }
        .hint { color: #777; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <h1>PlayCanvas MSDF Font Generator</h1>
        <p>Drop in a TTF/OTF — generate a PlayCanvas font and preview it live, entirely in your browser. Nothing is uploaded.</p>
    </header>
    <main>
        <div class="panel">
            <label for="file">Font file (.ttf / .otf)</label>
            <input type="file" id="file" accept=".ttf,.otf,.ttc">

            <label for="charset">Character set</label>
            <select id="charset"></select>

            <label for="size">Glyph size (px)</label>
            <input type="number" id="size" value="64" min="32" max="128" step="32">
            <div class="hint">Atlas resolution. 64 is standard; higher = sharper but larger.</div>

            <button id="go" disabled>Generate</button>
            <div id="status"></div>
            <div class="downloads">
                <a id="dl-json"></a>
                <a id="dl-png"></a>
            </div>
        </div>
        <div class="view">
            <h2>Preview</h2>
            <div class="pctl">
                <input type="text" id="ptext" value="Hello PlayCanvas" placeholder="Type to preview…">
                <label style="margin:0; text-transform:none; letter-spacing:0; color:#bbb;">Size <input type="number" id="psize" value="64" min="8" max="200" step="4"></label>
                <input type="color" id="pcolor" value="#ffffff" title="Text color">
            </div>
            <canvas id="preview"></canvas>
            <div class="hint" id="preview-hint">Generate a font to preview it here.</div>

            <details>
                <summary>MSDF atlas</summary>
                <canvas id="atlas"></canvas>
            </details>
        </div>
    </main>
    <script type="module" src="/main.js"></script>
</body>
</html>
